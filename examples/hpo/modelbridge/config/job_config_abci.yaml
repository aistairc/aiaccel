# aiaccel-job PBS configuration for ABCI.
#
# Replace placeholders before use:
# - path_to_env: path to your venv activate script
# - job_group: your ABCI group ID
# - modelbridge_module_*: module versions on your ABCI environment

path_to_env: PATH_TO_VENV/bin/activate
path_to_venv: PATH_TO_VENV
job_group: JOB_GROUP
modelbridge_module_gcc: gcc/13.2.0
modelbridge_module_python: python/3.10/3.10.14
modelbridge_python: python3

walltime: "1:0:0"

script_prologue: |
    echo Job ID: $PBS_JOBID
    echo Hostname: $(hostname)

    source /etc/profile.d/modules.sh
    module load ${modelbridge_module_gcc}
    module load ${modelbridge_module_python}
    source ${path_to_env}

    # Environment variables consumed by examples/hpo/modelbridge/objective.sh.
    export MODELBRIDGE_MODULE_GCC=${modelbridge_module_gcc}
    export MODELBRIDGE_MODULE_PYTHON=${modelbridge_module_python}
    export MODELBRIDGE_VENV=${path_to_venv}
    export MODELBRIDGE_PYTHON=${modelbridge_python}

qsub: "qsub -P ${job_group} -l walltime={args.walltime} -v USE_SSH=1"

cpu:
    qsub_args: "-q rt_HF -l select=1"
    job: "{command}"

cpu-array:
    n_tasks_per_proc: 128
    n_procs: 24
    qsub_args: "-q rt_HF -l select=1 -J 1-{args.n_tasks}:$(( {args.n_tasks_per_proc} * {args.n_procs} ))"
    job: "{command}"

gpu:
    qsub_args: "-q rt_HF -l select=1"
    job: "{command}"

gpu-array:
    n_tasks_per_proc: 128
    n_procs: 8
    qsub_args: "-q rt_HF -l select=1 -J 1-{args.n_tasks}:$(( {args.n_tasks_per_proc} * {args.n_procs} ))"
    job: "CUDA_VISIBLE_DEVICES=$(( LOCAL_PROC_INDEX % 8 )) {command}"

mpi:
    n_nodes: 1
    qsub_args: >-
        -q rt_HF
        -l select={args.n_nodes}:mpiprocs=$(( {args.n_procs} / {args.n_nodes} )):ompthreads=$(( {args.n_nodes} * 96 / {args.n_procs} ))
    job: |
        source /etc/profile.d/modules.sh
        module load hpcx

        mpirun -np {args.n_procs} -bind-to none -map-by slot \
            -mca pml ob1 -mca btl self,tcp -mca btl_tcp_if_include bond0 \
            {command}

train:
    qsub_args: >-
        -q $( (({args.n_gpus}==1)) && printf rt_HG || printf rt_HF )
        -l select=$(( ({args.n_gpus} + 7) / 8 )):mpiprocs=$( (({args.n_gpus}==1)) && printf 1 || printf 8 ):ompthreads=$( (({args.n_gpus}==1)) && printf 8 || printf 12 )
    job: |
        source /etc/profile.d/modules.sh
        module load hpcx

        mpirun -np {args.n_gpus} -bind-to none -map-by slot \
            -mca pml ob1 -mca btl self,tcp -mca btl_tcp_if_include bond0 \
            -x MAIN_ADDR=$(hostname -i) \
            -x MAIN_PORT=3000 \
            -x COLUMNS=120 \
            -x PYTHONUNBUFFERED=true \
            {command}

use_scandir: False
