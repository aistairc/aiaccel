# Modelbridge Configuration for simple_objective.py
n_train: 3
n_test: 2

# Objective command (args for each parameter are injected by prepare.py)
objective_command: ["python", "objectives/simple_objective.py"]

# Optional sampler seed bases (seed + run_id is used per run)
# seed_defaults:
#   train_macro: 42
#   train_micro: 142
#   test_macro: 1042
#   test_micro: 1142

# Number of HPO trials per run
train_macro_trials: 5
train_micro_trials: 5
test_macro_trials: 5
test_micro_trials: 5

# Parameter spaces
train_params:
  macro:
    x: {low: -1.0, high: 1.0}
    y: {low: -1.0, high: 1.0}
  micro:
    x: {low: -1.0, high: 1.0}
    y: {low: -1.0, high: 1.0}

test_params:
  macro:
    x: {low: -1.0, high: 1.0}
    y: {low: -1.0, high: 1.0}
  micro:
    x: {low: -1.0, high: 1.0}
    y: {low: -1.0, high: 1.0}
